<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Dark Signup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #050816, #0c1022, #111827);
      overflow: hidden;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(110px);
      opacity: 0.2;
      z-index: 0;
      animation: floatBlob 10s infinite alternate ease-in-out;
    }

    body::before {
      background: #2563eb;
      top: -100px;
      left: -100px;
    }

    body::after {
      background: #7c3aed;
      right: -120px;
      bottom: -120px;
      animation-delay: 2s;
    }

    @keyframes floatBlob {
      from {
        transform: translate(0, 0) scale(1);
      }
      to {
        transform: translate(30px, 20px) scale(1.1);
      }
    }

    .container {
      width: 100%;
      max-width: 470px;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    .signup-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #ffffff, #7dd3fc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .brand p {
      color: #b8c0d0;
      font-size: 0.95rem;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.93rem;
      color: #d8e1ef;
      font-weight: 600;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      color: white;
      font-size: 0.96rem;
      transition: all 0.3s ease;
    }

    .input-group input::placeholder {
      color: #8e98aa;
    }

    .input-group select option {
      background: #111827;
      color: white;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
      transform: translateY(-1px);
    }

    .signup-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 10px;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.24);
    }

    .signup-btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 18px 40px rgba(124, 58, 237, 0.28);
    }

    .signup-btn:active {
      transform: scale(0.99);
    }

    .message {
      margin-top: 16px;
      min-height: 22px;
      text-align: center;
      font-size: 0.93rem;
    }

    .success {
      color: #4ade80;
    }

    .error {
      color: #f87171;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      z-index: 999;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .otp-modal {
      width: 100%;
      max-width: 400px;
      background: rgba(15, 18, 30, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 22px;
      padding: 28px 22px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
      animation: popIn 0.3s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .otp-modal h2 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 1.5rem;
      background: linear-gradient(90deg, #ffffff, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .otp-modal p {
      text-align: center;
      color: #b7c2d4;
      margin-bottom: 18px;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .otp-input {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: white;
      font-size: 1rem;
      letter-spacing: 4px;
      text-align: center;
      outline: none;
      margin-bottom: 16px;
      transition: 0.3s ease;
    }

    .otp-input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .verify-btn,
    .cancel-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      transition: 0.3s ease;
    }

    .verify-btn {
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
    }

    .cancel-btn {
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .verify-btn:hover,
    .cancel-btn:hover {
      transform: translateY(-2px);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.92rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    /* RESPONSIVE ADDITIONS */

    @media (max-width: 480px) {
      body { padding: 10px; }

      .container { padding: 10px; }

      .signup-card {
        padding: 22px 16px;
        border-radius: 18px;
      }

      .brand h1 { font-size: 1.4rem; }
      .brand p { font-size: 0.85rem; }

      .input-group input,
      .input-group select {
        padding: 12px;
        font-size: 0.9rem;
      }

      .signup-btn {
        padding: 13px;
        font-size: 0.95rem;
      }

      .otp-modal {
        padding: 22px 16px;
        border-radius: 18px;
      }

      .otp-modal h2 { font-size: 1.3rem; }

      .otp-input {
        padding: 13px;
        font-size: 0.95rem;
      }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .container { max-width: 90%; }
      .signup-card { padding: 30px 22px; }
      .brand h1 { font-size: 1.7rem; }
      .otp-modal { max-width: 380px; }
    }

    @media (min-width: 769px) {
      .container { max-width: 470px; }
    }
  </style>
</head>
